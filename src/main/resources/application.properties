spring.application.name=api
spring.config.import=optional:file:.env

spring.datasource.url=jdbc:postgresql://${DATABASE_HOST}/${DATABASE_NAME}?sslmode=require
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

spring.datasource.hikari.data-source-properties.ssl=true
spring.datasource.hikari.data-source-properties.sslmode=require
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

server.servlet.context-path=/api
server.port=${SERVER_PORT:9090}

app.name=${APP_NAME}
app.description=${APP_DESCRIPTION}
app.version=${APP_VERSION}
app.environment=${APP_ENVIRONMENT}
app.status=${APP_STATUS}

rate-limit.skipped-path-prefixes[0]=/swagger-ui
rate-limit.skipped-path-prefixes[1]=/v3/api-docs
rate-limit.skipped-path-exacts[0]=/favicon.ico

rate-limit.default-rule.group=default
rate-limit.default-rule.capacity=10
rate-limit.default-rule.window=1m

rate-limit.rules[0].type=EXACT
rate-limit.rules[0].pattern=/api
rate-limit.rules[0].group=api-root
rate-limit.rules[0].capacity=20
rate-limit.rules[0].window=1m

rate-limit.rules[1].type=EXACT
rate-limit.rules[1].pattern=/api/
rate-limit.rules[1].group=api-root
rate-limit.rules[1].capacity=20
rate-limit.rules[1].window=1m

rate-limit.rules[2].type=PREFIX
rate-limit.rules[2].pattern=/api/search
rate-limit.rules[2].group=search-get
rate-limit.rules[2].capacity=10
rate-limit.rules[2].window=1m

rate-limit.rules[3].type=PREFIX
rate-limit.rules[3].pattern=/api/terms/create
rate-limit.rules[3].group=terms-create-write
rate-limit.rules[3].capacity=5
rate-limit.rules[3].window=1m

rate-limit.rules[4].type=PREFIX
rate-limit.rules[4].pattern=/api/terms/update
rate-limit.rules[4].group=terms-update-write
rate-limit.rules[4].capacity=5
rate-limit.rules[4].window=1m

rate-limit.rules[5].type=PREFIX
rate-limit.rules[5].pattern=/api/terms/delete
rate-limit.rules[5].group=terms-delete-write
rate-limit.rules[5].capacity=5
rate-limit.rules[5].window=1m

rate-limit.rules[6].type=PREFIX
rate-limit.rules[6].pattern=/api/categories/create
rate-limit.rules[6].group=categories-create-write
rate-limit.rules[6].capacity=5
rate-limit.rules[6].window=1m

rate-limit.rules[7].type=PREFIX
rate-limit.rules[7].pattern=/api/categories/update
rate-limit.rules[7].group=categories-update-write
rate-limit.rules[7].capacity=5
rate-limit.rules[7].window=1m

rate-limit.rules[8].type=PREFIX
rate-limit.rules[8].pattern=/api/categories/delete
rate-limit.rules[8].group=categories-delete-write
rate-limit.rules[8].capacity=5
rate-limit.rules[8].window=1m

rate-limit.rules[9].type=PREFIX
rate-limit.rules[9].pattern=/api/terms/draft/
rate-limit.rules[9].group=terms-draft-status-write
rate-limit.rules[9].capacity=8
rate-limit.rules[9].window=1m

rate-limit.rules[10].type=PREFIX
rate-limit.rules[10].pattern=/api/terms/archive/
rate-limit.rules[10].group=terms-archive-status-write
rate-limit.rules[10].capacity=8
rate-limit.rules[10].window=1m

rate-limit.rules[11].type=PREFIX
rate-limit.rules[11].pattern=/api/terms/publish/
rate-limit.rules[11].group=terms-publish-status-write
rate-limit.rules[11].capacity=8
rate-limit.rules[11].window=1m

rate-limit.rules[12].type=EXACT
rate-limit.rules[12].pattern=/api/terms/draft
rate-limit.rules[12].group=terms-draft-get
rate-limit.rules[12].capacity=10
rate-limit.rules[12].window=1m

rate-limit.rules[13].type=EXACT
rate-limit.rules[13].pattern=/api/terms/archived
rate-limit.rules[13].group=terms-archived-get
rate-limit.rules[13].capacity=10
rate-limit.rules[13].window=1m

rate-limit.rules[14].type=PREFIX
rate-limit.rules[14].pattern=/api/terms/letter
rate-limit.rules[14].group=terms-letter-get
rate-limit.rules[14].capacity=10
rate-limit.rules[14].window=1m

rate-limit.rules[15].type=PREFIX
rate-limit.rules[15].pattern=/api/terms/slug
rate-limit.rules[15].group=terms-slug-get
rate-limit.rules[15].capacity=10
rate-limit.rules[15].window=1m

rate-limit.rules[16].type=REGEX
rate-limit.rules[16].pattern=^/api/terms/[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$
rate-limit.rules[16].group=terms-by-id-get
rate-limit.rules[16].capacity=10
rate-limit.rules[16].window=1m

rate-limit.rules[17].type=PREFIX
rate-limit.rules[17].pattern=/api/terms
rate-limit.rules[17].group=terms-general-get
rate-limit.rules[17].capacity=10
rate-limit.rules[17].window=1m

rate-limit.rules[18].type=PREFIX
rate-limit.rules[18].pattern=/api/categories
rate-limit.rules[18].group=categories-get
rate-limit.rules[18].capacity=10
rate-limit.rules[18].window=1m

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:}
cors.allowed-methods=${CORS_ALLOWED_METHODS:GET,POST,PUT,PATCH,DELETE,OPTIONS}
cors.allowed-headers=${CORS_ALLOWED_HEADERS:*}
cors.exposed-headers=${CORS_EXPOSED_HEADERS:X-Rate-Limit-Remaining,Retry-After}
cors.allow-credentials=${CORS_ALLOW_CREDENTIALS:true}
cors.max-age=${CORS_MAX_AGE:3600}


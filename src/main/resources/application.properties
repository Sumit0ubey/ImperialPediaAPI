spring.application.name=api
spring.config.import=optional:file:.env

spring.datasource.url=jdbc:postgresql://${DATABASE_HOST}/${DATABASE_NAME}?sslmode=require
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

spring.datasource.hikari.data-source-properties.ssl=true
spring.datasource.hikari.data-source-properties.sslmode=require
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

server.servlet.context-path=/api

app.name=${APP_NAME}
app.description=${APP_DESCRIPTION}
app.version=${APP_VERSION}
app.environment=${APP_ENVIRONMENT}
app.status=${APP_STATUS}

rate-limit.skipped-path-prefixes[0]=/swagger-ui
rate-limit.skipped-path-prefixes[1]=/v3/api-docs
rate-limit.skipped-path-exacts[0]=/favicon.ico

rate-limit.default-rule.group=default
rate-limit.default-rule.capacity=25
rate-limit.default-rule.window=1m

rate-limit.rules[0].type=PREFIX
rate-limit.rules[0].pattern=/api/search
rate-limit.rules[0].group=search
rate-limit.rules[0].capacity=10
rate-limit.rules[0].window=1m

rate-limit.rules[1].type=PREFIX
rate-limit.rules[1].pattern=/api/terms/letter
rate-limit.rules[1].group=terms-letter
rate-limit.rules[1].capacity=20
rate-limit.rules[1].window=1m

rate-limit.rules[2].type=PREFIX
rate-limit.rules[2].pattern=/api/terms/slug
rate-limit.rules[2].group=terms-slug
rate-limit.rules[2].capacity=20
rate-limit.rules[2].window=1m

rate-limit.rules[3].type=EXACT
rate-limit.rules[3].pattern=/api/terms/archived
rate-limit.rules[3].group=terms-archived
rate-limit.rules[3].capacity=10
rate-limit.rules[3].window=1m

rate-limit.rules[4].type=EXACT
rate-limit.rules[4].pattern=/api/terms/draft
rate-limit.rules[4].group=terms-draft
rate-limit.rules[4].capacity=10
rate-limit.rules[4].window=1m

rate-limit.rules[5].type=EXACT
rate-limit.rules[5].pattern=/api/terms/create
rate-limit.rules[5].group=terms-create
rate-limit.rules[5].capacity=8
rate-limit.rules[5].window=1m

rate-limit.rules[6].type=PREFIX
rate-limit.rules[6].pattern=/api/terms/update
rate-limit.rules[6].group=terms-update
rate-limit.rules[6].capacity=12
rate-limit.rules[6].window=1m

rate-limit.rules[7].type=REGEX
rate-limit.rules[7].pattern=^/api/terms/[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$
rate-limit.rules[7].group=terms-by-id
rate-limit.rules[7].capacity=30
rate-limit.rules[7].window=1m

rate-limit.rules[8].type=PREFIX
rate-limit.rules[8].pattern=/api/terms
rate-limit.rules[8].group=terms-general
rate-limit.rules[8].capacity=30
rate-limit.rules[8].window=1m

rate-limit.rules[9].type=PREFIX
rate-limit.rules[9].pattern=/api/categories
rate-limit.rules[9].group=categories
rate-limit.rules[9].capacity=20
rate-limit.rules[9].window=1m

